<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/public.css">
    <link rel="stylesheet" href="layout_popup.css">

    <script src="https://kit.fontawesome.com/d19fdaba43.js" crossorigin="anonymous"></script>
    <title>Layout Popup Window</title>
</head>
<body>
<div>
    <div class="modal">
        <section class="image_section">
            <img src="image/shop-woman-3.webp" height="1056" width="800"/>
        </section>

        <section class="form_section">
            <form action="#">
                <div class="select_container">
                    <div>
                        <input type="checkbox" id="select_all">
                        <label for="select_all">전체선택</label>
                    </div>

                    <button type="button" class="close_btn">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="product_container">
                    <ul>
                        <li>
                            <div class="product_item">
                                <input type="checkbox" id="product1">
                                <label for="product1">
                                    <img src="/image/bag_1.webp" alt="발레리나 더플백 v3">
                                    <b><차정원 착용> 발레리나 더플백 v3</b>
                                    <span>WHITE/CREAM</span>
                                    <strong>79,900원</strong>
                                </label>
                            </div>
                            <div class="product_size" role="button">
                                <span>사이즈 선택</span>
                                <i class="fa-solid fa-angle-down"></i>
                            </div>
                        </li>
                        <li>
                            <div class="product_item">
                                <input type="checkbox" id="product1">
                                <label for="product1">
                                    <img src="/image/bag_2.webp" alt="발레리나 더플백 v3">
                                    <b><한소희 착용> 발레리나 더플백 v3</b>
                                    <span>BEIGE</span>
                                    <strong>79,900원</strong>
                                </label>
                            </div>
                            <div class="product_size" role="button">
                                <span>사이즈 선택</span>
                                <i class="fa-solid fa-angle-down"></i>
                            </div>
                        </li>
                        <li>
                            <div class="product_item">
                                <input type="checkbox" id="product1">
                                <label for="product1">
                                    <img src="/image/bag_3.webp" alt="발레리나 더플백 v3">
                                    <b>발레리나 더플백 v3</b>
                                    <span>BLUE/LIGHT BLUE</span>
                                    <strong>79,900원</strong>
                                </label>
                            </div>
                            <div class="product_size" role="button">
                                <span>사이즈 선택</span>
                                <i class="fa-solid fa-angle-down"></i>

                            </div>
                        </li>
                    </ul>
                </div>

                <div class="total_price_container">
                    <b>주문금액</b>
                    <b>79,900원</b>
                </div>

                <div class="submit_container">
                    <button type="submit">장바구니 담기</button>
                </div>
            </form>
        </section>
    </div>
</div>







</body>
</html>
